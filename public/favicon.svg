<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Dark blue gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1c38"/>
      <stop offset="100%" stop-color="#050e1f"/>
    </linearGradient>
    <!-- Gold gradient for the dot -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD75E"/>
      <stop offset="100%" stop-color="#FFC72C"/>
    </linearGradient>
    <!-- Soft glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Squircle Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  
  <g transform="translate(-16, 5)">
    <!-- Geometric Letter S -->
    <path d="M 230 170 H 130 A 40 40 0 0 0 90 210 A 40 40 0 0 0 130 250 H 190 A 40 40 0 0 1 230 290 A 40 40 0 0 1 190 330 H 90" 
          stroke="#ffffff" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          
    <!-- Geometric Letter P -->
    <path d="M 280 330 V 170 H 350 A 50 50 0 0 1 400 220 A 50 50 0 0 1 350 270 H 280" 
          stroke="#ffffff" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          
    <!-- Glowing Gold Dot -->
    <circle cx="455" cy="315" r="24" fill="url(#gold)" filter="url(#glow)"/>
  </g>
</svg>